services:
  database:
    container_name: book-rating-db
    build:
      context: ./postgres
    ports:
      - "5432"
    env_file:
      - ./postgres/.env

  app:
    container_name: book-rating-app
    build:
      context: ..
      dockerfile: infra/app/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./app/.env
    depends_on:
      - database