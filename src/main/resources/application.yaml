spring:
  application:
    name: book-rating-api

  datasource:
    url: ${JDBC_URL:jdbc:postgresql://localhost:5432/book_rating_db?currentSchema=book_ratings}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate

app:
  gutendex-client:
    base-url: https://gutendex.com
    books-path: books/
    search-param: search