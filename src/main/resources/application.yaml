spring:
  application:
    name: book-rating-api

  datasource:
    url: ${JDBC_URL:jdbc:postgresql://localhost:5432/book_rating_db?currentSchema=book_reviews}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate

app:
  gutendex-client:
    base-url: https://gutendex.com
    search-books-path: books/
    search-book-by-id-path: books/{id}/
    search-param: search